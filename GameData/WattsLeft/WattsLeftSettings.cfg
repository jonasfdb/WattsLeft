WATTSLEFT_SETTINGS
{
    // Length of one Kerbin year in seconds.
    // Default: 9203545 (426d 6h, stock Kerbal calendar)
    // RSS/RO players: set to 31557600 (one Earth year) for actual isotope half life times
    kerbinYearSeconds = 9203545

    // Multiplier applied to all RTG electricity output.
    // The raw value computed from fuel mass and power density is ~1000x, but that leads to insanely high outputs.
    // too small due to how KSP's ElectricCharge unit is scaled.
    // Default: 400. Adjust for RSS/RO/Sol if output feels unbalanced.
    electricityScalar = 400
}