// Watts Left compatibility for Sterling Systems
// covers only the betavoltaics so far because they can also decay
// plans for the future are to allow ThermalPower generators to use different isotopes
// not sure yet though? one day

// tiny one, original output 0.1 EC/s
@PART[strl-rctrbv01]:NEEDS[WattsLeft,B9PartSwitch]:AFTER[SterlingSystems]:HAS[!MODULE[ModuleWattsLeftRTG]]
{
    !MODULE[ModuleGenerator] {}

    MODULE
    {
        name = ModuleWattsLeftRTG
        efficiency = 1
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = wattsLeftIsotope
        switcherDescription = Isotope
        switcherDescriptionPlural = Isotopes
        uiGroupName = WattsLeft
        uiGroupDisplayName = RTG
        baseVolume = 4
        affectDragCubes = false
        switchInFlight = false

        SUBTYPE
        {
            name = Ticklium3
            title = Ticklium-3
            resourcesTweakable = false
            tankType = WattsLeftTicklium3
        }

        SUBTYPE
        {
            name = Cheesium137
            title = Cheesium-137
            resourcesTweakable = false
            tankType = WattsLeftCheesium137
        }

        SUBTYPE
        {
            name = Karbon14
            title = Karbon-14
            resourcesTweakable = false
            tankType = WattsLeftKarbon14
        }
    }

    @description ^= :$: <#ef7b06> \nPower output diminishes over time depending on selected isotope.</color>:
    @description ^= :$: <#C8EF06> \nOnly works with beta decay.</color>:
}


