@PART[rtg]:NEEDS[WattsLeft,B9PartSwitch]
{
    @description ^= :$: <color=#ef7b06>Power output diminishes over time depending on selected fuel type.</color>:
    
    !MODULE[ModuleGenerator] {}     // no more stock rtg power generation

    MODULE
    {
        name = ModuleWattsLeftRTG
        efficiency = 1
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = wattsLeftIsotope
        switcherDescription = Isotope
        switcherDescriptionPlural = Isotopes
        uiGroupName = WattsLeft
        uiGroupDisplayName = RTG
        baseVolume = 4
        affectDragCubes = false
        switchInFlight = false

        SUBTYPE
        {
            name = Blutonium238
            title = Blutonium-238
            primaryColor = #FA9A6A
            secondaryColor = #C36910
            resourcesTweakable = false
            tankType = WattsLeftBlutonium238
        }

        SUBTYPE
        {
            name = Kurbium244
