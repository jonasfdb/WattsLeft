@PART[bluedog_Pioneer_SNAP19]:NEEDS[Bluedog_DB,B9PartSwitch]:FOR[WattsLeft]:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[meshSwitchExtension]]]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[meshSwitchExtension]]
    {
        @SUBTYPE[Extension]
        {
            MODULE
            {
                IDENTIFIER
                {
                    name = ModuleB9PartSwitch
                    moduleID = wattsLeftIsotope
                }

                DATA
                {
                    baseVolume = 14
                }
            }
        }
    }
}


