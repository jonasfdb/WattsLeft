// Watts Left compatibility for Bluedog Design Bureau RTGs
// Covers BDB Parts/ProbeExpansion
// caution: long file

// GPHS RTG, original output 1.5 EC/s
@PART[bluedog_RTG_GPHS]:NEEDS[WattsLeft,B9PartSwitch]:AFTER[Bluedog_DB]:HAS[!MODULE[ModuleWattsLeftRTG]]
{
    !MODULE[ModuleGenerator] {}

    MODULE
    {
        name = ModuleWattsLeftRTG
        b9ModuleID = wattsLeftIsotope
        infoOutputThreshold = 0.1
        generateElectricity = true
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = wattsLeftIsotope
        switcherDescription = Isotope
        switcherDescriptionPlural = Isotopes
        uiGroupName = WattsLeft
        uiGroupDisplayName = RTG
        baseVolume = 14
        affectDragCubes = false
        switchInFlight = false

        SUBTYPE
        {
            name = Blutonium238
            title = Blutonium-238
            primaryColor = #FA9A6A
            secondaryColor = #C36910
            resourcesTweakable = false
            tankType = WattsLeftBlutonium238
        }

        SUBTYPE
        {
            name = Mamerikium241
            title = Mamerikium-241
            primaryColor = #FF6600
            secondaryColor = #85360E
            resourcesTweakable = false
            tankType = WattsLeftMamerikium241
        }

        SUBTYPE
        {
            name = Neidonium237
            title = Neidonium-237
            primaryColor = #B48EDB
            secondaryColor = #644395
            resourcesTweakable = false
            tankType = WattsLeftNeidonium237
        }

    }

    @description ^= :$: <#ef7b06> Power output diminishes over time depending on selected isotope.</color>:
    @description ^= :$: <#066BEF> Only works with long-lasting isotopes.</color>:
}


