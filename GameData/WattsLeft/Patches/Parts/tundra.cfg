// Watts Left compatibility for Near Future Electrical RTGs
// covers Tundra Exploration

// New Horizons RTG, original output 0.9 EC/s
@PART[TT_19_NH_Generator]:NEEDS[WattsLeft,B9PartSwitch,TundraTechnologies]:AFTER[TundraTechnologies]:HAS[!MODULE[ModuleWattsLeftRTG]]
{
    !MODULE[ModuleGenerator] {}

    MODULE
    {
        name = ModuleWattsLeftRTG
        b9ModuleID = wattsLeftIsotope
        infoOutputThreshold = 0.1
        generateElectricity = true
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = wattsLeftIsotope
        switcherDescription = Isotope
        switcherDescriptionPlural = Isotopes
        uiGroupName = WattsLeft
        uiGroupDisplayName = RTG
        baseVolume = 10
        affectDragCubes = false
        switchInFlight = false

        SUBTYPE
        {
            name = Blutonium238
            title = Blutonium-238
            tankType = WattsLeftBlutonium238
            resourcesTweakable = false
        }

        SUBTYPE
        {
            name = Kurbium244
            title = Kurbium-244
            tankType = WattsLeftKurbium244
            resourcesTweakable = false
        }

        SUBTYPE
        {
            name = Spronkium90
            title = Spronkium-90
            tankType = WattsLeftSpronkium90
            resourcesTweakable = false
        }

        SUBTYPE
        {
            name = Mamerikium241
            title = Mamerikium-241
            tankType = WattsLeftMamerikium241
            resourcesTweakable = false
        }

        SUBTYPE
        {
            name = Neidonium237
            title = Neidonium-237
            tankType = WattsLeftNeidonium237
            resourcesTweakable = false
        }

        SUBTYPE
        {
            name = Bolognium210
            title = Bolognium-210
            tankType = WattsLeftBolognium210
            resourcesTweakable = false
        }
    }

    @description ^= :$: <#ef7b06> Power output diminishes over time depending on selected isotope.</color>:
}