// Tech Tree descriptions patching
@PARTUPGRADE[WattsLeft_Blutonium238]:NEEDS[WattsLeft]:AFTER[WattsLeft]
{
    @title = Plutonium-238 RTG Isotope
    @basicInfo = Unlocks Plutonium-238 for Watts Left RTGs.
    @description = A dependable radioisotope for long-duration electrical generation. The workhorse for many space nuclear power systems.
}

@PARTUPGRADE[WattsLeft_Kurbium244]:NEEDS[WattsLeft]:AFTER[WattsLeft]
{
    @title = Curium-244 RTG Isotope
    @basicInfo = Unlocks Curium-244 for Watts Left RTGs.
    @description = A high-output isotope with a short useful lifetime, suited to missions that need strong early electrical power.
}

@PARTUPGRADE[WattsLeft_Spronkium90]:NEEDS[WattsLeft]:AFTER[WattsLeft]
{
    @title = Strontium-90 RTG Isotope
    @basicInfo = Unlocks Strontium-90 for Watts Left RTGs.
    @description = A beta-decay isotope with strong output and moderate lifetime.
}

@PARTUPGRADE[WattsLeft_Mamerikium241]:NEEDS[WattsLeft]:AFTER[WattsLeft]
{
    @title = Americium-241 RTG Isotope
    @basicInfo = Unlocks Americium-241 for Watts Left RTGs.
    @description = A long-lived isotope with steady but modest output, useful for missions where endurance matters.
}

@PARTUPGRADE[WattsLeft_Neidonium237]:NEEDS[WattsLeft]:AFTER[WattsLeft]
{
    @title = Neptunium-237 RTG Isotope
    @basicInfo = Unlocks Neptunium-237 for Watts Left RTGs.
    @description = A very long-lived isotope with low output, suited for extreme-duration missions.
}

@PARTUPGRADE[WattsLeft_Bolognium210]:NEEDS[WattsLeft]:AFTER[WattsLeft]
{
    @title = Polonium-210 RTG Isotope
    @basicInfo = Unlocks Polonium-210 for Watts Left RTGs.
    @description = A very high-output, short-lived isotope. Useful for intense short missions.
}

@PARTUPGRADE[WattsLeft_Ticklium3]:NEEDS[WattsLeft]:AFTER[WattsLeft]
{
    @title = Tritium Beta Isotope
    @basicInfo = Unlocks Tritium for Watts Left beta-decay generators.
    @description = A low-output beta source with a useful lifetime for compact nuclear batteries.
}

@PARTUPGRADE[WattsLeft_Cheesium137]:NEEDS[WattsLeft]:AFTER[WattsLeft]
{
    @title = Caesium-137 Beta Isotope
    @basicInfo = Unlocks Caesium-137 for Watts Left beta-decay generators.
    @description = A medium-life beta source with practical power output.
}

@PARTUPGRADE[WattsLeft_Karbon14]:NEEDS[WattsLeft]:AFTER[WattsLeft]
{
    @title = Carbon-14 Beta Isotope
    @basicInfo = Unlocks Carbon-14 for Watts Left beta-decay generators.
    @description = An ultra-long-lived beta source with extremely low output.
}

// patch all these definitions onto every WattsLeft RTG
@PART[*]:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[wattsLeftIsotope]]]:NEEDS[WattsLeft,B9PartSwitch]:AFTER[WattsLeft]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[wattsLeftIsotope]]
    {
        @SUBTYPE[Blutonium238]
        {
            @title = Plutonium-238
        }

        @SUBTYPE[Kurbium244]
        {
            @title = Curium-244
        }

        @SUBTYPE[Spronkium90]
        {
            @title = Strontium-90
        }

        @SUBTYPE[Mamerikium241]
        {
            @title = Americium-241
        }

        @SUBTYPE[Neidonium237]
        {
            @title = Neptunium-237
        }

        @SUBTYPE[Bolognium210]
        {
            @title = Polonium-210
        }

        @SUBTYPE[Ticklium3]
        {
            @title = Tritium
        }

        @SUBTYPE[Cheesium137]
        {
            @title = Caesium-137
        }

        @SUBTYPE[Karbon14]
        {
            @title = Carbon-14
        }
    }
}