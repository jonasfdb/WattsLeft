// these patches get applied to every single RTG subtype so that these global things like description and upgrade can be centralized here
// changing something here changes all the patches

@PART[*]:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[wattsLeftIsotope]]]:NEEDS[WattsLeft,B9PartSwitch]:AFTER[WattsLeft]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[wattsLeftIsotope]]
    {
        @SUBTYPE[Blutonium238]
        {
            // no upgrade required, see upgrades config file
            descriptionSummary = Reliable, slow decay. Not to use as paperweight.
            descriptionDetail = Half-life: 13.09 years\nEstimated lifespan: 86.91 years
        }

        @SUBTYPE[Kurbium244]
        {
            // same here
            descriptionSummary = Decays hotter and punchier than most of its cousins.
            descriptionDetail = Half-life: 2.15 years\nEstimated lifespan: 14.27 years
        }

        @SUBTYPE[Spronkium90]
        {
            upgradeRequired = WattsLeft_Spronkium90
            descriptionSummary = Solid all-rounder. The dad of isotopes, one might say.
            descriptionDetail = Half-life: 5.54 years\nEstimated lifespan: 36.78 years
        }

        @SUBTYPE[Mamerikium241]
        {
            upgradeRequired = WattsLeft_Mamerikium241
            descriptionSummary = Optimal choice for anything beyond Jool.
            descriptionDetail = Half-life: 22.53 years\nEstimated lifespan: 149.60 years
        }

        @SUBTYPE[Bolognium210]
        {
            upgradeRequired = WattsLeft_Bolognium210
            descriptionSummary = Extremely violent. Use nervously. Absolutely no licking.
            descriptionDetail = Half-life: 0.27 years\nEstimated lifespan: 1.79 years
        }

        @SUBTYPE[Neidonium237]
        {
            upgradeRequired = WattsLeft_Neidonium237
            descriptionSummary = Absurd lifespan at abysmal power, but pretty.
            descriptionDetail = Half-life: 62.86 years\nEstimated lifespan: 417.39 years
        }

        @SUBTYPE[Ticklium3]
        {
            // no upgrade required to permit Ticklium to show up immediately
            // same reason as above
            descriptionSummary = Absurd lifespan at abysmal power, but pretty.
            descriptionDetail = Half-life: 1.16 years\nEstimated lifespan: 7.69 years
            primaryColor = #229BFF
            secondaryColor = #047AE8
        }

        @SUBTYPE[Cheesium137]
        {
            upgradeRequired = WattsLeft_Cheesium137
            descriptionSummary = Absurd lifespan at abysmal power, but pretty.
            descriptionDetail = Half-life: 23.22 years\nEstimated lifespan: 154.18 years
            primaryColor = #FFD426
            secondaryColor = #EEBB00
        }

        @SUBTYPE[Karbon14]
        {
            upgradeRequired = WattsLeft_Karbon14
            descriptionSummary = Absurd lifespan at abysmal power, but pretty.
            descriptionDetail = Half-life: 104.72 years\nEstimated lifespan: 695.34 years
            primaryColor = #898989
            secondaryColor = #494949
        }
    }
}