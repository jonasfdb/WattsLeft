// makes isotopes unlockable via tech tree

// RTG isotopes
PARTUPGRADE
{
    // technically this is not needed because B9 requires at least one selectable isotope so this one has no requirement
    // I am keeping it for good measure in case one wants to mess around
    // placed in survivability because thats where BDB unlocks the first RTG
    name = WattsLeft_Blutonium238
    partIcon = rtg
    techRequired = survivability
    entryCost = 0
    title = Blutonium-238 RTG Isotope
    basicInfo = Unlocks Blutonium-238 for RTGs.
    manufacturer = Ionic Symphonic Protonic Electronics
    description = The workhorse of Kerbal radioisotope engineering since the beginning. Blutonium-238 is not flashy, not fussy, and unlikely to frighten the interns.
}

PARTUPGRADE
{
    // similarly, this one is also not needed
    // in both cases the global upgradeRequired patch does not apply for these two isotopes
    name = WattsLeft_Kurbium244
    partIcon = rtg
    techRequired = basicScience
    entryCost = 0
    title = Kurbium-244 RTG Isotope
    basicInfo = Unlocks Kurbium-244 for RTGs.
    manufacturer = Ionic Symphonic Protonic Electronics
    description = Kurbium-244 occupies the middle ground between useful and "please stop glowing so much". A strong choice for missions that need a lot of power for a medium amount of time.
}

