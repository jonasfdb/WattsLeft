// Watts Left optional real isotope half-lives
// Rename this file from .cfg.disabled to .cfg to enable
// Recommended for Sol/RSS/RO-style games, values are Earth years

// This patch changes some power density amounts for balance on long-living isotopes too

// The mod uses Kerbin year length as variable to calculate decay times
// To match real world times the year length is patched to the legnth of an Earth year
// Should be fine with RSS/RO and such, but you can comment this out
// If you do that the mod will use the real-world year count but count a year as Kerbin years
@WATTSLEFT_SETTINGS:NEEDS[WattsLeft]
{
    @KerbinYearSeconds = 31557600
}

// half life patching
@WATTSLEFT_ISOTOPE[Blutonium238]:NEEDS[WattsLeft]
{
    @halfLife = 87.7
    @powerDensity = 0.49
}

@WATTSLEFT_ISOTOPE[Kurbium244]:NEEDS[WattsLeft]
{
    @halfLife = 18.1
}

@WATTSLEFT_ISOTOPE[Spronkium90]:NEEDS[WattsLeft]
{
    @halfLife = 28.79
}

@WATTSLEFT_ISOTOPE[Mamerikium241]:NEEDS[WattsLeft]
{
    @halfLife = 432.2
    @powerDensity = 0.41
}

@WATTSLEFT_ISOTOPE[Neidonium237]:NEEDS[WattsLeft]
{
    @halfLife = 2140000
    @powerDensity = 0.07
}

@WATTSLEFT_ISOTOPE[Bolognium210]:NEEDS[WattsLeft]
{
    @halfLife = 0.378
    @powerDensity = 6.52
}

@WATTSLEFT_ISOTOPE[Ticklium3]:NEEDS[WattsLeft]
{
    @halfLife = 12.32
}

@WATTSLEFT_ISOTOPE[Cheesium137]:NEEDS[WattsLeft]
{
    @halfLife = 30.05
}

@WATTSLEFT_ISOTOPE[Karbon14]:NEEDS[WattsLeft]
{
    @halfLife = 5730
}

// B9 description patching
// Have to do this because B9 descriptions are hardcoded with half-lives
@PART[*]:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[wattsLeftIsotope]]]:NEEDS[WattsLeft,B9PartSwitch]:AFTER[WattsLeft]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[wattsLeftIsotope]]
    {
        @SUBTYPE[Blutonium238]
        {
            @descriptionDetail = Half-life: 87.8 years\nEstimated lifespan: 597.48 years  
        }

        @SUBTYPE[Kurbium244]
        {
            @descriptionDetail = Half-life: 18.1 years\nEstimated lifespan: 119.46 years  
        }

        @SUBTYPE[Spronkium90]
        {
            @descriptionDetail = Half-life: 28.79 years\nEstimated lifespan: 190.01 years  
        }

        @SUBTYPE[Mamerikium241]
        {
            @descriptionDetail = Half-life: 432.2 years\nEstimated lifespan: 2852.52 years  
        }

        @SUBTYPE[Neidonium237]
        {
            @descriptionDetail = Half-life: 2.14 million years\nEstimated lifespan: 16 million years  
        }

        @SUBTYPE[Bolognium210]
        {
            @descriptionDetail = Half-life: 0.378 years\nEstimated lifespan: 2.49 years  
        }

        @SUBTYPE[Ticklium3]
        {
            @descriptionDetail = Half-life: 12.32 years\nEstimated lifespan: 81.31 years  
        }

        @SUBTYPE[Cheesium137]
        {
            @descriptionDetail = Half-life: 30.05 years\nEstimated lifespan: 198.33 years  
        }

        @SUBTYPE[Karbon14]
        {
            @descriptionDetail = Half-life: 5730 years\nEstimated lifespan: 37818 years    
        }
    }
}